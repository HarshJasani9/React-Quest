<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Background tile matching the design system paper token -->
  <rect x="5" y="5" width="90" height="90" rx="22" fill="#FAF7F0" stroke="#B8B4AB" stroke-width="4" />
  
  <!-- Stylized React Atom & Quest Compass -->
  <g transform="translate(50, 50)">
    <!-- React Atom Orbits in Signal Green -->
    <ellipse rx="34" ry="12" fill="none" stroke="#2D6A4F" stroke-width="4" transform="rotate(0)" opacity="0.8" />
    <ellipse rx="34" ry="12" fill="none" stroke="#2D6A4F" stroke-width="4" transform="rotate(60)" opacity="0.8" />
    <ellipse rx="34" ry="12" fill="none" stroke="#2D6A4F" stroke-width="4" transform="rotate(120)" opacity="0.8" />
    
    <!-- Central Nucleus / Compass Rose -->
    <circle r="7" fill="#2D6A4F" />
    
    <!-- North Pointer (Caution Red) -->
    <polygon points="0,-20 5,-7 -5,-7" fill="#9A3B26" transform="rotate(30)" />
    <!-- South Pointer (Slate) -->
    <polygon points="0,20 5,7 -5,7" fill="#3D4451" transform="rotate(30)" />
  </g>
</svg>
