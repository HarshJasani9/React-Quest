name: CI/CD Build Workflow

# Define trigger events for the workflow
on:
  # Run the workflow on every push to the main branch
  push:
    branches:
      - main
  # Run the workflow on every pull request (against any target branch)
  pull_request:
  # Enable manual triggering of this workflow from the GitHub Actions tab
  workflow_dispatch:

jobs:
  build:
    # Run the job on the latest Ubuntu runner
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code from the repository
      # This pulls the codebase into the runner workspace
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Install Node.js on the runner environment
      # Configures Node.js version 20 and enables automatic npm caching
      # based on the package-lock.json file to speed up subsequent runs
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Step 3: Install project dependencies
      # Using 'npm ci' (Clean Install) which is faster and more reliable
      # in CI environments compared to 'npm install' because it installs
      # the exact versions locked in package-lock.json
      - name: Install dependencies
        run: npm ci


      # Step 3.5: Run linting (conditional)
      # Checks if a lint script is defined in package.json using jq.
      # If it exists, runs 'npm run lint'. Otherwise, logs a message and skips.
      - name: Run lint script (if defined)
        run: |
          if jq -e '.scripts.lint' package.json >/dev/null; then
            echo "Lint script found. Running 'npm run lint'..."
            npm run lint
          else
            echo "No 'lint' script found in package.json. Skipping linting step."
          fi

      # Step 4: Build the application for production
      # Compiles JSX and assets into the output directory 'dist/' using Vite
      - name: Build project
        run: npm run build

      # Step 5: Upload the compiled build folder as an artifact
      # Uploads the 'dist' directory, making the build artifact available
      # for download in the workflow run summary (retained for 7 days)
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: reactquest-build
          path: dist/
          retention-days: 7

  docker-build:
    name: Build & Verify Docker Images
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the codebase
      # This pulls the repository files into the runner workspace so it can access Dockerfiles
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx
      # Configures buildx, which is a Docker CLI plugin that enables multi-stage builds,
      # build caching, and parallel build capabilities in GitHub Actions
      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v3

      # Step 3: Compile and verify all Docker Compose images
      # Runs 'docker compose build' to trigger compilation for both the 'frontend' and 'validator'
      # containers. If any error is encountered (such as syntax errors or copy target mismatches),
      # the command exits with a non-zero code, failing the CI run.
      - name: Build Docker Compose images
        run: docker compose build

